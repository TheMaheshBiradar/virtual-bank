# Spring Boot configuration for H2 database
spring.datasource.url=jdbc:h2:mem:salesdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Show SQL in logs
spring.jpa.show-sql=true

# ── AI Provider Configuration ──────────────────────────────
# Supported values: gemini | openai | heuristic
# Default: heuristic (no API key required, uses local rule engine)
ai.provider=heuristic

# Google Gemini
# ai.provider=gemini
ai.gemini.api-key=${GEMINI_API_KEY:}
ai.gemini.model=gemini-2.5-flash

# OpenAI
# ai.provider=openai
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openai.model=gpt-4o
